<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>問題演習 — Java Silver 学習サイト</title>
<link rel="stylesheet" href="css/style.css">
<style>
.mode-tabs {
  display: flex;
  background: var(--gray-100);
  border-radius: var(--radius-lg);
  padding: 0.25rem;
  gap: 0.25rem;
  width: fit-content;
}
.mode-tab {
  padding: 0.45rem 1.25rem;
  border-radius: var(--radius);
  border: none;
  background: transparent;
  cursor: pointer;
  font-size: 0.875rem;
  font-weight: 600;
  color: var(--gray-500);
  transition: all var(--transition);
  font-family: inherit;
}
.mode-tab.active { background: var(--white); color: var(--primary); box-shadow: var(--shadow-sm); }
.mode-tab:hover:not(.active) { color: var(--gray-700); }

.filter-panel {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 1.25rem;
  margin-bottom: 1.5rem;
  border: 1px solid var(--gray-200);
  box-shadow: var(--shadow-sm);
}
.kbd {
  background: var(--gray-100);
  border: 1px solid var(--gray-300);
  border-radius: 4px;
  padding: 0.1rem 0.35rem;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--gray-600);
}
</style>
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <div class="nav-logo">
      <div class="logo-icon">☕</div>
      <a href="index.html">Java Silver</a>
    </div>
    <button class="nav-toggle" aria-label="メニュー">☰</button>
    <ul class="nav-links">
      <li><a href="index.html">ホーム</a></li>
      <li><a href="exam.html">試験範囲</a></li>
      <li><a href="questions.html" class="active">問題演習</a></li>
      <li><a href="explanation.html">詳細解説</a></li>
      <li><a href="cheatsheet.html">チートシート</a></li>
      <li><a href="practical.html">業務活用</a></li>
      <li><a href="roadmap.html">ロードマップ</a></li>
    </ul>
  </div>
</nav>

<div class="container">
  <div class="quiz-container">

    <div class="flex items-center justify-between mb-3 flex-wrap gap-1">
      <div>
        <h1 style="font-size:1.5rem;font-weight:800;color:var(--gray-800);letter-spacing:-0.02em">✏️ 問題演習</h1>
        <p style="font-size:0.875rem;color:var(--gray-500);margin-top:0.25rem">全 <strong id="total-q-count">0</strong> 問 · カテゴリ・難易度でフィルターして学習</p>
      </div>
      <div style="display:flex;align-items:center;gap:0.4rem;font-size:0.75rem;color:var(--gray-400)">
        <kbd class="kbd">1</kbd><kbd class="kbd">2</kbd><kbd class="kbd">3</kbd><kbd class="kbd">4</kbd> 選択
        <span style="margin:0 0.2rem">·</span>
        <kbd class="kbd">Enter</kbd> 次へ
      </div>
    </div>

    <!-- 学習統計 -->
    <div id="progress-area" style="margin-bottom:1.25rem"></div>

    <!-- モード切替 -->
    <div class="flex items-center justify-between mb-3 flex-wrap gap-2">
      <div class="mode-tabs">
        <button class="mode-tab active" id="mode-all" onclick="QuizApp.setMode('all')">🎯 全問題</button>
        <button class="mode-tab" id="mode-wrong" onclick="QuizApp.setMode('wrong')">❌ 要復習</button>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="QuizApp.startQuiz(QuizApp.currentCategory, QuizApp.currentDifficulty)">🔄 リスタート</button>
    </div>

    <!-- フィルターパネル -->
    <div class="filter-panel" id="filter-panel">
      <div class="filter-section">
        <div class="filter-label">カテゴリ</div>
        <div class="filter-bar" id="cat-filters">
          <button class="filter-btn active" data-category="all">すべて</button>
        </div>
      </div>
      <div style="height:0.875rem"></div>
      <div class="filter-section" style="margin-bottom:0">
        <div class="filter-label">難易度</div>
        <div class="filter-bar" id="diff-filters">
          <button class="filter-btn active" data-difficulty="all">すべて</button>
          <button class="filter-btn" data-difficulty="easy">🟢 易しい</button>
          <button class="filter-btn" data-difficulty="medium">🟡 普通</button>
          <button class="filter-btn" data-difficulty="hard">🔴 難しい</button>
        </div>
      </div>
    </div>

    <!-- プログレス -->
    <div class="flex items-center justify-between mb-1">
      <span id="progress-text" class="quiz-progress-text">— / — 問</span>
      <span id="filtered-count" style="font-size:0.78rem;color:var(--gray-400)"></span>
    </div>
    <div class="progress-bar-wrap" style="margin-bottom:1.5rem">
      <div class="progress-bar" id="progress-bar" style="width:0%"></div>
    </div>

    <!-- 問題エリア -->
    <div id="quiz-area">
      <div class="card text-center" style="padding:3rem">
        <p style="color:var(--gray-400)">読み込み中...</p>
      </div>
    </div>

  </div>
</div>

<footer>
  <div class="footer-inner">
    <div class="footer-links">
      <a href="index.html">ホーム</a>
      <a href="exam.html">試験範囲</a>
      <a href="questions.html">問題演習</a>
      <a href="explanation.html">詳細解説</a>
      <a href="cheatsheet.html">チートシート</a>
      <a href="practical.html">業務活用</a>
      <a href="roadmap.html">ロードマップ</a>
    </div>
    <p class="footer-copy">Java Silver 学習サイト &copy; 2025</p>
  </div>
</footer>

<script src="js/questions.js"></script>
<script src="js/storage.js"></script>
<script src="js/app.js"></script>
<script>
document.getElementById("total-q-count").textContent = QUESTIONS.length;

// mini progress summary
const pa = document.getElementById("progress-area");
if (pa) {
  const p = Storage.getProgress();
  pa.innerHTML = `
    <div class="stats-grid" style="grid-template-columns:repeat(4,1fr)">
      <div class="stat-card"><span class="stat-num">${p.rate}%</span><span class="stat-label">習得率</span></div>
      <div class="stat-card"><span class="stat-num">${p.correct}/${p.total}</span><span class="stat-label">正解数</span></div>
      <div class="stat-card"><span class="stat-num">${Storage.getStats().accuracy}%</span><span class="stat-label">正解率</span></div>
      <div class="stat-card"><span class="stat-num" style="background:linear-gradient(135deg,#ef4444,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">${Storage.getWrongIds().length}</span><span class="stat-label">要復習</span></div>
    </div>
  `;
}
</script>
</body>
</html>
